# AutoOverview - Nginx Configuration
# Frontend: static files from /app/AutoOverview/frontend/dist/
# Backend: FastAPI + uvicorn on port 8000

upstream autooverview_backend {
    server 127.0.0.1:8006;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name autooverview.snappicker.com;

    # Logs
    access_log /var/log/nginx/autooverview-access.log;
    error_log /var/log/nginx/autooverview-error.log;

    # Max upload size
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # =====================================================
    # Backend API proxy
    # =====================================================
    location /api {
        proxy_pass http://autooverview_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for review generation (LLM calls can take minutes)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # FastAPI docs
    location /docs {
        proxy_pass http://autooverview_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://autooverview_backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://autooverview_backend;
        proxy_set_header Host $host;
    }

    # =====================================================
    # Frontend static files
    # =====================================================
    root /app/AutoOverview/frontend/dist;
    index index.html;

    # Static assets with long cache (Vite adds content hash)
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static file types
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA routing - all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Certbot verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # =====================================================
    # Security
    # =====================================================
    # Block sensitive files
    location ~ /\.ht {
        deny all;
        return 404;
    }
    location ~ /\.git {
        deny all;
        return 404;
    }
    location ~ /\.env {
        deny all;
        return 404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# =====================================================
# HTTPS
# =====================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name autooverview.snappicker.com;

    ssl_certificate /etc/letsencrypt/live/autooverview.snappicker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autooverview.snappicker.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/autooverview-access.log;
    error_log /var/log/nginx/autooverview-error.log;

    # Max upload size
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Backend API proxy
    location /api {
        proxy_pass http://autooverview_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /docs { proxy_pass http://autooverview_backend; }
    location /openapi.json { proxy_pass http://autooverview_backend; }
    location /redoc { proxy_pass http://autooverview_backend; }

    # Frontend static files
    root /app/AutoOverview/frontend/dist;
    index index.html;

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security
    location ~ /\.ht { deny all; return 404; }
    location ~ /\.git { deny all; return 404; }
    location ~ /\.env { deny all; return 404; }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name autooverview.snappicker.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}
